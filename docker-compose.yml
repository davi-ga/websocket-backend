services:

  wapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wapi
    command: sh -c "python3 manage.py migrate && python3 manage.py runserver 0.0.0.0:${API_PORT}"
    restart: always
    env_file:
      - .env
    ports:
      - ${API_PORT}:${API_PORT}
    networks:
      - websocket
    volumes:
      - ./core:/app/core
      - ./features:/app/features

  db:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - websocket
    volumes:
      - websocket:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: wredis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - websocket
    volumes:
      - websocket_redis:/data


networks:
  websocket:
    driver: bridge

volumes:
  websocket:
  websocket_redis: