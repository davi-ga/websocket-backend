services:

  wapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wapi
    command: sh -c "python3 manage.py migrate && python3 manage.py runserver 0.0.0.0:${API_PORT}"
    restart: always
    env_file:
      - .env
    ports:
      - ${API_PORT}:${API_PORT}
    networks:
      - websocket
    volumes:
      - ./core:/app/core
      - ./features:/app/features
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: "curl --silent --fail http://localhost:${API_PORT}/api/health/"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      
  db:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - websocket
    volumes:
      - websocket:/var/lib/postgresql/data
    healthcheck:
      test: 
        [
          "CMD-SHELL", 
          "pg_isready -U ${DB_USER} -d ${DB_NAME}"
        ]
      interval: 4s
      timeout: 7s
      retries: 40

  redis:
    image: redis:alpine
    container_name: wredis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - websocket
    volumes:
      - websocket_redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  websocket:
    driver: bridge

volumes:
  websocket:
  websocket_redis: